<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">LightFlow architecture overview</title>
  <desc id="desc">A diagram showing agents and humans authoring Rust assets, LightFlow planning runs, CortexFS executing requests, and clients using OpenAPI or CLI.</desc>
  <rect width="1120" height="560" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <text x="56" y="58" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#0f172a">LightFlow runtime map</text>
  <text x="56" y="88" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#475569">Agents author code assets. LightFlow plans runs. CortexFS owns Linux execution surfaces.</text>

  <g filter="url(#shadow)">
    <rect x="56" y="135" width="215" height="135" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="82" y="175" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Authors</text>
    <text x="82" y="206" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">Agents write workflows</text>
    <text x="82" y="230" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">Humans judge outputs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="356" y="112" width="260" height="181" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="386" y="153" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Rust assets</text>
    <text x="386" y="184" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">lightflow/models/*.rs</text>
    <text x="386" y="208" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">lightflow/nodes/*.rs</text>
    <text x="386" y="232" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">lightflow/compositions/*.rs</text>
    <text x="386" y="256" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">lightflow/workflows/*.rs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="704" y="112" width="300" height="181" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="734" y="153" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a">LightFlow engine</text>
    <text x="734" y="184" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">Asset discovery and validation</text>
    <text x="734" y="208" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">Run preview and planning</text>
    <text x="734" y="232" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">XDG manifests, events, traces</text>
    <text x="734" y="256" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">Framework-independent API service</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="356" y="370" width="260" height="112" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="386" y="410" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Clients</text>
    <text x="386" y="441" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">CLI, HTTP/OpenAPI, future UI</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="704" y="348" width="300" height="156" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="734" y="389" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a">CortexFS at /ctx</text>
    <text x="734" y="420" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">Provider and model routing</text>
    <text x="734" y="444" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">Tool, MCP, thread, policy, audit</text>
    <text x="734" y="468" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#475569">Atomic inbox/outbox execution</text>
  </g>

  <path d="M272 202 H346" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M617 202 H694" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M854 294 V338" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M704 426 H626" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M486 370 V306 H704" stroke="#334155" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
</svg>
