openapi: 3.1.0
info:
  title: LightFlow API
  version: 0.1.0
  description: Backend API contract for Rust-defined LightFlow workflows.
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Backend is reachable.
  /openapi.yaml:
    get:
      summary: Read OpenAPI contract
      description: Returns the LightFlow HTTP API contract used by editor and tool clients.
      responses:
        "200":
          description: OpenAPI YAML document.
          content:
            application/yaml:
              schema:
                type: string
  /loop:
    get:
      summary: Check local workflow loop readiness
      description: Reports whether the project is ready for the edit, validate, run, trace, replay, and publish loop.
      responses:
        "200":
          description: Project readiness report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalLoopReport"
  /loop/changes:
    get:
      summary: Check workflow source change safety
      description: Reports changed workflow crate files and whether each changed workflow has a colocated agent skill update.
      responses:
        "200":
          description: Workflow source change safety report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoopChangesReport"
  /loop/projects:
    get:
      summary: Inspect project workspaces
      description: Reports the `projects/` sibling workspace catalog used for multi-repo workflow iteration.
      parameters:
        - name: dirty
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, returns only workspaces with changed paths or uninspectable git status.
        - name: project
          in: query
          required: false
          schema:
            type: string
          description: Optional workspace filter matching a project name, label, path, or lightflow-* short alias, such as `lightflow-std`, `projects/lightflow-std`, or `std`.
      responses:
        "200":
          description: Linked project workspace catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWorkspaceCatalog"
  /release:
    get:
      summary: Check release readiness
      description: Returns a non-mutating release gate plan with required artifacts, document sections, source-change review, and command gates.
      parameters:
        - name: workflow_id
          in: query
          required: false
          description: Selected workflow for the replay-required release gate. Defaults to lightflow.text_plan.
          schema:
            type: string
        - name: project
          in: query
          required: false
          description: Narrow project workspace review and project commands to one workspace by name, label, path, or lightflow-* short alias, such as lightflow-std or std.
          schema:
            type: string
      responses:
        "200":
          description: Release readiness report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseCheckReport"
  /publish:
    get:
      summary: List workflow publish readiness
      description: Returns non-mutating Cargo publish dry-run preflights for local workflow crates, optionally narrowed to one linked project workspace.
      parameters:
        - in: query
          name: project
          schema:
            type: string
          description: Narrow publish readiness to one linked project workspace by full name, label, path, or lightflow-* short alias.
      responses:
        "200":
          description: Workflow publish readiness catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowPublishCatalog"
  /workflows:
    get:
      summary: List workflows
      responses:
        "200":
          description: Workflow summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowList"
    post:
      summary: Save a workflow
      description: Saves the workflow as `.lightflow/workflows/<crate>/src/lib.rs`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowSpec"
      responses:
        "201":
          description: Saved workflow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowSpec"
  /nodes:
    get:
      summary: List workflow-backed nodes
      description: Returns editor-facing node cards with Node Schema v1 ports, runtime executor status, model requirements, and validation status.
      responses:
        "200":
          description: Node catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeCatalog"
  /nodes/{workflow_id}:
    get:
      summary: Read a workflow-backed node
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Node card.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeCard"
  /executors:
    get:
      summary: List runtime executors
      description: Returns the shared Executor Registry with status labels, availability reasons, data policies, and model-planning flags.
      responses:
        "200":
          description: Runtime executor catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExecutorCatalog"
  /models:
    get:
      summary: List node model requirements
      description: Returns model requirements declared by visible nodes, including port bindings.
      parameters:
        - name: workflow_id
          in: query
          required: false
          description: Return only model requirements declared by this workflow id.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Return all, available, or blocked model requirements.
          schema:
            type: string
            enum: [all, available, blocked]
      responses:
        "200":
          description: Model requirement catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelCatalog"
  /runs:
    get:
      summary: List recorded runs
      description: Lists local `.lightflow/runs` history for editor run browsers.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of newest run summaries to return after filtering.
          schema:
            type: integer
            minimum: 0
        - name: workflow_id
          in: query
          required: false
          description: Return only runs whose recorded stages include this workflow id.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Return only runs with this summary status, such as completed, failed, or unknown.
          schema:
            type: string
            enum: [completed, failed, unknown]
      responses:
        "200":
          description: Run catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunCatalog"
  /runs/{run_id}:
    get:
      summary: Read a recorded run
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
          description: Run id or `last`.
      responses:
        "200":
          description: Run manifest, execution, and events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunTrace"
    delete:
      summary: Remove a recorded run
      description: Deletes one local run directory. The `last` selector resolves before deletion.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
          description: Run id or `last`.
      responses:
        "200":
          description: Removed run status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemovedRun"
  /runs/{run_id}/events:
    get:
      summary: Read recorded run events
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
          description: Run id or `last`.
      responses:
        "200":
          description: Run event stream.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunEvents"
  /runs/{run_id}/replay:
    post:
      summary: Replay a recorded run
      description: Executes the stages stored in a run manifest and records a new immutable run.
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
          description: Run id or `last`.
      responses:
        "200":
          description: Replayed workflow or pipeline execution.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplayedRunExecution"
  /artifacts:
    get:
      summary: List recorded run artifacts
      description: Lists artifact handles found in recorded run executions, optionally filtered for focused inspection.
      parameters:
        - in: query
          name: run_id
          schema:
            type: string
          description: Return only artifacts from this run id, or `last`.
        - in: query
          name: workflow_id
          schema:
            type: string
          description: Return only artifacts produced by this workflow id.
        - in: query
          name: kind
          schema:
            type: string
          description: Return only artifacts with this kind, such as `image` or `mask`.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 0
          description: Maximum number of artifact rows to return after filtering.
      responses:
        "200":
          description: Artifact catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactCatalog"
  /patches:
    get:
      summary: List reusable workflow patches
      description: Lists project-local reusable patches stored under `.lightflow/patches`.
      responses:
        "200":
          description: Patch catalog.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchCatalog"
  /patches/{name}:
    get:
      summary: Read a reusable workflow patch
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Registered patch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisteredPatch"
    post:
      summary: Save a reusable workflow patch
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowPatch"
      responses:
        "200":
          description: Saved patch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedPatch"
    delete:
      summary: Remove a reusable workflow patch
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed patch status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemovedPatch"
  /patches/validate:
    post:
      summary: Validate a workflow patch
      parameters:
        - name: workflow_id
          in: query
          required: false
          description: Validate the patch against one selected workflow's node and replacement/fallback port contracts.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowPatch"
      responses:
        "200":
          description: Patch validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PatchValidation"
  /workflows/{workflow_id}:
    get:
      summary: Read a workflow
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowSpec"
  /workflows/{workflow_id}/dependencies:
    get:
      summary: Resolve workflow dependencies
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recursive workflow dependency report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDependencyReport"
  /workflows/{workflow_id}/loop:
    get:
      summary: Check workflow loop readiness
      description: Reports whether one workflow is ready for validation, planning, execution, trace, replay, and publish dry-run.
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
        - name: require_replay
          in: query
          required: false
          description: Fail the selected workflow readiness report when no completed run can be replayed.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Workflow readiness report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalLoopReport"
  /workflows/{workflow_id}/plan:
    get:
      summary: Plan a workflow
      description: Returns the selected executor, atom, and model plan for a workflow without executing it.
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow execution plan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowPlan"
  /workflows/{workflow_id}/publish:
    get:
      summary: Check workflow publish readiness
      description: Returns a non-mutating Cargo publish dry-run preflight for one local workflow crate.
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow publish preflight report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowPublishCheck"
  /workflows/{workflow_id}/run:
    post:
      summary: Execute a workflow
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowExecutionOptions"
      responses:
        "200":
          description: Workflow execution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordedWorkflowExecution"
  /workflows/validate:
    post:
      summary: Validate a workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowSpec"
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowValidation"
  /mcp:
    get:
      summary: MCP endpoint info
      responses:
        "200":
          description: MCP transport information.
    post:
      summary: MCP JSON-RPC endpoint
      responses:
        "200":
          description: JSON-RPC response.
components:
  schemas:
    ErrorResponse:
      type: object
      required: [error, code, message, status]
      properties:
        error:
          type: string
          description: Human-readable adapter-prefixed error string.
        code:
          type: string
          enum: [invalid_request, not_found, internal_error]
        message:
          type: string
          description: Human-readable error detail without adapter prefix.
        status:
          type: integer
          description: HTTP status code.
        run_id:
          type: string
          description: Failed run id when a workflow execution error was recorded.
        run_dir:
          type: string
          description: Failed run directory when a workflow execution error was recorded.
        trace_path:
          type: string
          description: Path to the recorded failed execution JSON when available.
    PortSpec:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
        required:
          type: boolean
        default:
          description: Default JSON value for this port.
        min:
          type: number
        max:
          type: number
        step:
          type: number
        enum:
          type: array
          items: true
        widget:
          type: string
          description: UI widget hint for editors.
        artifact_kind:
          type: string
          description: Artifact kind carried by this port, such as image or mask.
        model_requirement:
          type: string
          description: Model requirement id associated with this port.
    WorkflowSpec:
      type: object
      required: [id, version, name]
      properties:
        id:
          type: string
        version:
          type: string
          default: 0.1.0
        name:
          type: string
        description:
          type: string
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        config_schema:
          description: Optional JSON schema for workflow configuration.
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowDependencyRequirement"
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelRequirement"
        runtimes:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeRequirement"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowEdge"
    WorkflowDependencyRequirement:
      type: object
      required: [workflow_id]
      properties:
        workflow_id:
          type: string
        version:
          type: string
        install:
          $ref: "#/components/schemas/CargoDependency"
    CargoDependency:
      type: object
      required: [crate_name]
      properties:
        crate_name:
          type: string
        version:
          type: string
        source:
          $ref: "#/components/schemas/CargoDependencySource"
        package:
          type: string
    CargoDependencySource:
      oneOf:
        - type: object
          required: [kind, value]
          properties:
            kind:
              type: string
              const: path
            value:
              type: string
        - type: object
          required: [kind, value]
          properties:
            kind:
              type: string
              const: git
            value:
              type: string
    WorkflowNode:
      type: object
      required: [id, workflow_id]
      properties:
        id:
          type: string
        workflow_id:
          type: string
        title:
          type: string
        disabled:
          type: boolean
          default: false
        position:
          $ref: "#/components/schemas/WorkflowPosition"
        config:
          description: Node-specific configuration.
    WorkflowPosition:
      type: object
      properties:
        x:
          type: integer
        y:
          type: integer
    WorkflowEdge:
      type: object
      required: [from, to]
      properties:
        from:
          $ref: "#/components/schemas/WorkflowEndpoint"
        to:
          $ref: "#/components/schemas/WorkflowEndpoint"
    WorkflowEndpoint:
      type: object
      required: [node, port]
      properties:
        node:
          type: string
        port:
          type: string
    WorkflowList:
      type: object
      required: [workflows]
      properties:
        workflows:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowSummary"
    NodeCatalog:
      type: object
      required: [nodes, categories, runtimes]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeCard"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/NodeCategory"
        runtimes:
          type: array
          items:
            $ref: "#/components/schemas/NodeRuntimeSummary"
    NodeCategory:
      type: object
      required: [category, nodes]
      properties:
        category:
          type: string
        nodes:
          type: integer
    NodeRuntimeSummary:
      type: object
      required: [capability, nodes, available_executors]
      properties:
        capability:
          type: string
        nodes:
          type: integer
        available_executors:
          type: integer
    ExecutorCatalog:
      type: object
      required: [executors]
      properties:
        executors:
          type: array
          items:
            $ref: "#/components/schemas/ExecutorInfo"
    ExecutorInfo:
      type: object
      required: [id, kind, status, status_reason, capabilities, available, data_policy, plans_models]
      properties:
        id:
          type: string
        kind:
          type: string
        status:
          type: string
          enum: [builtin, preview, mock, external, native, reserved]
        status_reason:
          type: string
        capabilities:
          type: array
          items:
            type: string
        available:
          type: boolean
        data_policy:
          type: string
          enum: [json_values, artifact_handles, device_resident_preferred]
        plans_models:
          type: boolean
        features:
          type: array
          items:
            type: string
        env:
          type: string
        command:
          type: string
    NodeCard:
      type: object
      required:
        - id
        - version
        - name
        - kind
        - inputs
        - outputs
        - dependencies
        - models
        - runtimes
        - graph
        - validation
      properties:
        id:
          type: string
        version:
          type: string
        name:
          type: string
        category:
          type: string
        description:
          type: string
        kind:
          type: string
          enum: [leaf, composite]
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowDependencyRequirement"
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelRequirement"
        runtimes:
          type: array
          items:
            $ref: "#/components/schemas/NodeRuntimeStatus"
        graph:
          $ref: "#/components/schemas/NodeGraphSummary"
        validation:
          $ref: "#/components/schemas/NodeValidationSummary"
    NodeGraphSummary:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: integer
        edges:
          type: integer
    NodeValidationSummary:
      type: object
      required: [valid, issues]
      properties:
        valid:
          type: boolean
        issues:
          type: array
          items:
            type: string
    NodeRuntimeStatus:
      type: object
      required: [id, capability, available, executors]
      properties:
        id:
          type: string
        capability:
          type: string
        engine:
          type: string
        available:
          type: boolean
        executors:
          type: array
          items:
            $ref: "#/components/schemas/NodeExecutorStatus"
    NodeExecutorStatus:
      type: object
      required: [id, kind, status, status_reason, available, data_policy, plans_models]
      properties:
        id:
          type: string
        kind:
          type: string
        status:
          type: string
          enum: [builtin, preview, mock, external, native, reserved]
          description: Executor maturity/status label for UI and planning clients.
        status_reason:
          type: string
          description: Human-readable reason the executor is or is not available.
        available:
          type: boolean
        data_policy:
          type: string
          enum: [json_values, artifact_handles, device_resident_preferred]
        plans_models:
          type: boolean
          description: True when this executor plans model resources through lockfile-backed requirements.
        features:
          type: array
          items:
            type: string
        env:
          type: string
        command:
          type: string
    ModelCatalog:
      type: object
      required: [total, available_count, blocked_count, issues, models]
      properties:
        total:
          type: integer
          description: Number of model requirements declared by discovered workflows.
        available_count:
          type: integer
          description: Number of model requirements whose locked local paths are available.
        blocked_count:
          type: integer
          description: Number of model requirements blocked by missing, invalid, or incomplete lockfile state.
        issues:
          type: array
          description: Model lock readiness issues in `<workflow_id>::<requirement_id>` form.
          items:
            type: string
        models:
          type: array
          items:
            $ref: "#/components/schemas/NodeModelCard"
    NodeModelCard:
      type: object
      required: [workflow_id, workflow_name, requirement, bindings, lock, sync_command, verify_command]
      properties:
        workflow_id:
          type: string
        workflow_name:
          type: string
        category:
          type: string
        requirement:
          $ref: "#/components/schemas/ModelRequirement"
        bindings:
          type: array
          items:
            $ref: "#/components/schemas/NodeModelBinding"
        lock:
          $ref: "#/components/schemas/ModelLockStatus"
        sync_command:
          type: array
          description: Command that can create or update the selected model lock and download/cache a model for this workflow.
          items:
            type: string
        verify_command:
          type: array
          description: Command that verifies the existing lockfile and cached model paths for this workflow.
          items:
            type: string
    ModelLockStatus:
      type: object
      required: [status, key, missing_paths]
      properties:
        status:
          type: string
          enum: [missing_lock, missing_entry, missing_path, available, invalid_lock]
        key:
          type: string
          description: Lockfile key in `<workflow_id>::<requirement_id>` form.
        variant_id:
          type: string
        repo:
          type: string
        file:
          type: string
        format:
          type: string
        sha256:
          type: string
        hash_algorithm:
          type: string
        size_bytes:
          type: integer
        snapshot_revision:
          type: string
        local_paths:
          type: array
          items:
            type: string
        missing_paths:
          type: array
          items:
            type: string
    NodeModelBinding:
      type: object
      required: [direction, port]
      properties:
        direction:
          type: string
          enum: [input, output]
        port:
          type: string
