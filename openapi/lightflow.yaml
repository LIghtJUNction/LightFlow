openapi: 3.1.0
info:
  title: LightFlow API
  version: 0.1.0
  description: Backend API contract for LightFlow components and nested workflows.
servers:
  - url: http://localhost:5174
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is reachable.
  /components:
    get:
      summary: List components
      operationId: listComponents
      responses:
        "200":
          description: Component summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentList"
    post:
      summary: Save a component
      operationId: saveComponent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ComponentSpec"
      responses:
        "201":
          description: Component saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentSpec"
  /components/{component_id}:
    get:
      summary: Read a component
      operationId: getComponent
      parameters:
        - name: component_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Component spec.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComponentSpec"
        "404":
          description: Component not found.
  /workflows:
    get:
      summary: List workflows
      operationId: listWorkflows
      responses:
        "200":
          description: Workflow summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowList"
    post:
      summary: Save a workflow
      operationId: saveWorkflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowSpec"
      responses:
        "201":
          description: Workflow saved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowSpec"
        "400":
          description: Workflow failed validation.
  /workflows/{workflow_id}:
    get:
      summary: Read a workflow
      operationId: getWorkflow
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow spec.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowSpec"
        "404":
          description: Workflow not found.
  /workflows/validate:
    post:
      summary: Validate a workflow
      operationId: validateWorkflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowSpec"
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowValidation"
components:
  schemas:
    PortSpec:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
    ComponentSpec:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        config_schema:
          type:
            - object
            - "null"
    ComponentList:
      type: object
      required: [components]
      properties:
        components:
          type: array
          items:
            $ref: "#/components/schemas/ComponentSummary"
    ComponentSummary:
      type: object
      required: [id, name, inputs, outputs]
      properties:
        id:
          type: string
        name:
          type: string
        inputs:
          type: integer
        outputs:
          type: integer
    WorkflowSpec:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowEdge"
    WorkflowNode:
      type: object
      required: [id, uses]
      properties:
        id:
          type: string
        uses:
          type: string
          enum: [component, workflow]
        component_id:
          type: string
        workflow_id:
          type: string
        title:
          type: string
        position:
          $ref: "#/components/schemas/WorkflowPosition"
        config:
          type:
            - object
            - "null"
    WorkflowPosition:
      type: object
      properties:
        x:
          type: integer
        y:
          type: integer
    WorkflowEdge:
      type: object
      required: [from, to]
      properties:
        from:
          $ref: "#/components/schemas/WorkflowEndpoint"
        to:
          $ref: "#/components/schemas/WorkflowEndpoint"
    WorkflowEndpoint:
      type: object
      required: [node, port]
      properties:
        node:
          type: string
        port:
          type: string
    WorkflowList:
      type: object
      required: [workflows]
      properties:
        workflows:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowSummary"
    WorkflowSummary:
      type: object
      required: [id, name, inputs, outputs, nodes, edges]
      properties:
        id:
          type: string
        name:
          type: string
        inputs:
          type: integer
        outputs:
          type: integer
        nodes:
          type: integer
        edges:
          type: integer
    WorkflowValidation:
      type: object
      required: [valid, issues, topological_order]
      properties:
        valid:
          type: boolean
        issues:
          type: array
          items:
            type: string
        topological_order:
          type: array
          items:
            type: string
