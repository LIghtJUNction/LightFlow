        kind:
          type: string
          enum: [leaf, composite]
        runtime:
          $ref: "#/components/schemas/WorkflowRuntimePlan"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowPlanNode"
    WorkflowPlanNode:
      type: object
      required: [node_id, kind, workflow_id, candidate_workflow_ids, disabled]
      properties:
        node_id:
          type: string
        kind:
          type: string
          enum: [workflow, if]
        workflow_id:
          type: string
          description: Authored workflow reference on the graph node.
        candidate_workflow_ids:
          type: array
          items:
            type: string
          description: Workflows this node may execute before runtime input or patch selection.
        selected_workflow_id:
          type: string
          description: Deterministic workflow selected without runtime inputs.
        disabled:
          type: boolean
        child_kind:
          type: string
          enum: [leaf, composite]
        runtime:
          $ref: "#/components/schemas/WorkflowRuntimePlan"
    WorkflowRuntimePlan:
      type: object
      required:
        - plan_node_id
        - executor_id
        - executor_kind
        - executor_status
        - executor_status_reason
        - executor_available
        - capabilities
        - data_policy
        - plans_models
        - recipe
        - atoms
        - models
        - declared
      properties:
        plan_node_id:
          type: string
        executor_id:
          type: string
        executor_kind:
          type: string
        executor_status:
          type: string
          enum: [builtin, preview, mock, external, native, reserved]
        executor_status_reason:
          type: string
        executor_available:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
        data_policy:
          type: string
          enum: [json_values, artifact_handles, device_resident_preferred]
        plans_models:
          type: boolean
        recipe:
          type: string
        atoms:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowPlanAtom"
        models:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowPlannedModel"
        declared:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeRequirement"
    WorkflowPlanAtom:
      type: object
      required: [id, capability]
      properties:
        id:
          type: string
        capability:
          type: string
    WorkflowPlannedModel:
      type: object
      required: [requirement_id, capability]
      properties:
        requirement_id:
          type: string
        capability:
          type: string
        preferred_format:
          type: string
    ModelRequirement:
      type: object
      required: [id, capability]
      properties:
        id:
          type: string
        capability:
          type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ModelVariant"
    ModelVariant:
      type: object
      required: [id, provider, format, repo]
      properties:
        id:
          type: string
        provider:
          type: string
          enum: [hugging_face]
        format:
          type: string
        repo:
          type: string
        file:
          type: string
    RuntimeRequirement:
      type: object
      required: [id, capability]
      properties:
        id:
          type: string
        capability:
          type: string
        engine:
          type: string
    WorkflowVersionMismatch:
      type: object
      required: [workflow_id, required, found, required_by]
      properties:
        workflow_id:
          type: string
        required:
          type: string
        found:
          type: string
        required_by:
          type: string
    WorkflowExecutionOptions:
      type: object
      properties:
        inputs:
          type: object
          additionalProperties: true
        disabled_nodes:
          type: array
          items:
            type: string
        enabled_nodes:
          type: array
          items:
            type: string
        patch:
          $ref: "#/components/schemas/WorkflowPatch"
    WorkflowPatch:
      type: object
      properties:
        nodes:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/WorkflowNodePatch"
    WorkflowNodePatch:
      type: object
      properties:
        disable:
          type: boolean
        enable:
          type: boolean
        replace_with:
          type: string
        fallback_workflow_id:
          type: string
        retry:
          type: integer
        timeout_ms:
          type: integer
    PatchCatalog:
      type: object
      required: [patches, root]
      properties:
        patches:
          type: array
          items:
            $ref: "#/components/schemas/PatchSummary"
        root:
          type: string
    PatchSummary:
      type: object
      required: [name, path]
      properties:
        name:
          type: string
        path:
          type: string
    RegisteredPatch:
      type: object
      required: [name, path, patch]
      properties:
        name:
          type: string
        path:
          type: string
        patch:
          $ref: "#/components/schemas/WorkflowPatch"
    SavedPatch:
      type: object
      required: [saved, name, path, patch]
      properties:
        saved:
          type: boolean
        name:
          type: string
        path:
          type: string
        patch:
          $ref: "#/components/schemas/WorkflowPatch"
    RemovedPatch:
      type: object
      required: [removed, name, path]
      properties:
        removed:
          type: boolean
        name:
          type: string
        path:
          type: string
    PatchValidation:
      type: object
      required: [valid, issues, patch]
      properties:
        valid:
          type: boolean
        issues:
          type: array
          items:
            type: string
        patch:
          $ref: "#/components/schemas/WorkflowPatch"
    WorkflowExecution:
      type: object
      required: [workflow_id, version, inputs, outputs, nodes]
      properties:
        workflow_id:
          type: string
        version:
          type: string
        inputs:
          type: object
          additionalProperties: true
        outputs:
          type: object
          additionalProperties: true
        runtime:
          $ref: "#/components/schemas/ExecutionRuntime"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowArtifact"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeExecution"
        model_locks:
          type: array
          items:
            $ref: "#/components/schemas/ModelLockFingerprint"
    RecordedWorkflowExecution:
      type: object
      required:
        - workflow_id
        - version
        - inputs
        - outputs
        - nodes
        - model_locks
        - run_id
        - run_dir
        - trace_path
      properties:
        workflow_id:
          type: string
        version:
          type: string
        inputs:
          type: object
          additionalProperties: true
        outputs:
          type: object
          additionalProperties: true
        runtime:
          $ref: "#/components/schemas/ExecutionRuntime"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowArtifact"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeExecution"
        model_locks:
          type: array
          items:
            $ref: "#/components/schemas/ModelLockFingerprint"
        run_id:
          type: string
          description: Project-local recorded run id.
        run_dir:
          type: string
          description: Project-local recorded run directory.
        trace_path:
          type: string
          description: Path to the recorded execution JSON.
    ReplayedRunExecution:
      type: object
      required:
        - run_id
        - run_dir
        - trace_path
        - replayed_from
        - replay
        - model_locks
      properties:
        workflow_id:
          type: string
        version:
          type: string
        pipeline:
          type: boolean
        stages:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowExecution"
        inputs:
          type: object
          additionalProperties: true
        outputs:
          type: object
          additionalProperties: true
        runtime:
          $ref: "#/components/schemas/ExecutionRuntime"
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowArtifact"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeExecution"
        model_locks:
          type: array
          items:
            $ref: "#/components/schemas/ModelLockFingerprint"
        run_id:
          type: string
          description: New recorded run id created by replay.
        run_dir:
          type: string
          description: New project-local recorded run directory.
        trace_path:
          type: string
          description: Path to the new recorded execution JSON.
        replayed_from:
          type: string
          description: Original run selector replayed by this request.
        replay:
          $ref: "#/components/schemas/ReplayReport"
    FailedRunExecution:
      type: object
      description: Execution payload recorded when a run fails before producing a normal execution result.
      properties:
        status:
          type: string
          enum: [failed]
        error:
          type: object
          additionalProperties: true
          description: Failure message reported by the run surface.
        pipeline:
          type: boolean
          description: True when the failed run was a pipeline.
        stages:
          type: array
          description: Requested run stages, including effective inputs resolved before execution.
          items:
            $ref: "#/components/schemas/RunStageRecord"
        partial_execution:
          $ref: "#/components/schemas/PipelineExecution"
    PipelineExecution:
      type: object
      description: Completed portion of a pipeline execution.
      required: [pipeline, stages, outputs, artifacts]
      properties:
        pipeline:
          type: boolean
          enum: [true]
        stages:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowExecution"
        outputs:
          type: object
          additionalProperties: true
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowArtifact"
        model_locks:
          type: array
          items:
            $ref: "#/components/schemas/ModelLockFingerprint"
    ReplayReport:
      type: object
      required:
        - replayed_from
        - runtime_changed
        - model_lock_changed
        - original_runtime
        - replayed_runtime
        - original_model_locks
        - replayed_model_locks
      properties:
        replayed_from:
          type: string
        runtime_changed:
          type: boolean
          description: True when selected runtime fingerprints differ between the original and replayed execution.
        model_lock_changed:
          type: boolean
          description: True when model lock fingerprints differ between the original and replayed execution.
        original_runtime:
          type: array
          items:
            $ref: "#/components/schemas/ReplayRuntimeFingerprint"
        replayed_runtime:
          type: array
          items:
            $ref: "#/components/schemas/ReplayRuntimeFingerprint"
        original_model_locks:
          type: array
          items:
            $ref: "#/components/schemas/ModelLockFingerprint"
        replayed_model_locks:
          type: array
          items:
            $ref: "#/components/schemas/ModelLockFingerprint"
    ReplayRuntimeFingerprint:
      type: object
      required: [workflow_id, runtime]
      properties:
        stage_index:
          type: integer
        workflow_id:
          type: string
        node_id:
          type: string
        runtime:
          $ref: "#/components/schemas/ExecutionRuntime"
    ModelLockFingerprint:
      type: object
      required: [workflow_id, requirement_id, lock]
      properties:
        stage_index:
          type: integer
        workflow_id:
          type: string
        node_id:
          type: string
        requirement_id:
          type: string
        lock:
          $ref: "#/components/schemas/ModelLockStatus"
    WorkflowArtifact:
      type: object
      required: [id, kind, path, mime_type]
      properties:
        id:
          type: string
        kind:
          type: string
        path:
          type: string
        mime_type:
          type: string
        metadata:
          type: object
          additionalProperties: true
    NodeExecution:
      type: object
      required: [node_id, workflow_id, status, inputs, outputs]
      properties:
        node_id:
          type: string
        workflow_id:
          type: string
        selected_workflow_id:
          type: string
        runtime:
          $ref: "#/components/schemas/ExecutionRuntime"
        status:
          type: string
          enum: [completed, skipped]
        duration_ms:
          type: integer
        attempts:
          type: integer
        inputs:
          type: object
          additionalProperties: true
        outputs:
          type: object
          additionalProperties: true
        artifacts:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowArtifact"
        nodes:
          type: array
          description: Recursive child executions when this node selected a composite workflow.
          items:
            $ref: "#/components/schemas/NodeExecution"
    ExecutionRuntime:
      type: object
      required: [executor_id, executor_kind, capabilities, data_policy]
      properties:
        executor_id:
          type: string
          description: Executor selected by the backend runtime registry.
        executor_kind:
          type: string
          description: Executor maturity/status label such as builtin, preview, mock, external, native, or reserved.
        capabilities:
          type: array
          items:
            type: string
        data_policy:
          type: string
          enum: [json_values, artifact_handles, device_resident_preferred]
        declared:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeRequirement"
        replay_fingerprint:
          type: object
          additionalProperties: true
          description: Stable executor-specific evidence used to detect runtime drift during replay.
