openapi: 3.1.0
info:
  title: LightFlow API
  version: 0.1.0
  description: Backend API contract for Rust-defined LightFlow workflows.
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Backend is reachable.
  /workflows:
    get:
      summary: List workflows
      responses:
        "200":
          description: Workflow summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowList"
    post:
      summary: Save a workflow
      description: Saves the workflow as `lightflow/workflows/<workflow_id>/src/lib.rs`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowSpec"
      responses:
        "201":
          description: Saved workflow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowSpec"
  /workflows/{workflow_id}:
    get:
      summary: Read a workflow
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workflow.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowSpec"
  /workflows/{workflow_id}/dependencies:
    get:
      summary: Resolve workflow dependencies
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Recursive workflow dependency report.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDependencyReport"
  /workflows/{workflow_id}/run:
    post:
      summary: Execute a workflow
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowExecutionOptions"
      responses:
        "200":
          description: Workflow execution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowExecution"
  /workflows/validate:
    post:
      summary: Validate a workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowSpec"
      responses:
        "200":
          description: Validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowValidation"
  /mcp:
    get:
      summary: MCP endpoint info
      responses:
        "200":
          description: MCP transport information.
    post:
      summary: MCP JSON-RPC endpoint
      responses:
        "200":
          description: JSON-RPC response.
components:
  schemas:
    PortSpec:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
    WorkflowSpec:
      type: object
      required: [id, version, name]
      properties:
        id:
          type: string
        version:
          type: string
          default: 0.1.0
        name:
          type: string
        description:
          type: string
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/PortSpec"
        config_schema:
          description: Optional JSON schema for workflow configuration.
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowDependencyRequirement"
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelRequirement"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowEdge"
    WorkflowDependencyRequirement:
      type: object
      required: [workflow_id]
      properties:
        workflow_id:
          type: string
        version:
          type: string
    WorkflowNode:
      type: object
      required: [id, workflow_id]
      properties:
        id:
          type: string
        workflow_id:
          type: string
        title:
          type: string
        disabled:
          type: boolean
          default: false
        position:
          $ref: "#/components/schemas/WorkflowPosition"
        config:
          description: Node-specific configuration.
    WorkflowPosition:
      type: object
      properties:
        x:
          type: integer
        y:
          type: integer
    WorkflowEdge:
      type: object
      required: [from, to]
      properties:
        from:
          $ref: "#/components/schemas/WorkflowEndpoint"
        to:
          $ref: "#/components/schemas/WorkflowEndpoint"
    WorkflowEndpoint:
      type: object
      required: [node, port]
      properties:
        node:
          type: string
        port:
          type: string
    WorkflowList:
      type: object
      required: [workflows]
      properties:
        workflows:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowSummary"
    WorkflowSummary:
      type: object
      required: [id, version, name, inputs, outputs, dependencies, models, nodes, edges]
      properties:
        id:
          type: string
        version:
          type: string
        name:
          type: string
        inputs:
          type: integer
        outputs:
          type: integer
        dependencies:
          type: integer
        models:
          type: integer
        nodes:
          type: integer
        edges:
          type: integer
    WorkflowValidation:
      type: object
      required: [valid, issues, topological_order]
      properties:
        valid:
          type: boolean
        issues:
          type: array
          items:
            type: string
        topological_order:
          type: array
          items:
            type: string
    WorkflowDependencyReport:
      type: object
      required:
        - workflow_id
        - complete
        - workflows
        - resolved
        - workflow_order
        - missing_workflows
        - version_mismatches
        - cycles
      properties:
        workflow_id:
          type: string
        complete:
          type: boolean
        workflows:
          type: array
          items:
            type: string
        resolved:
          type: array
          items:
            $ref: "#/components/schemas/ResolvedWorkflowDependency"
        workflow_order:
          type: array
          items:
            type: string
        missing_workflows:
          type: array
          items:
            type: string
        version_mismatches:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowVersionMismatch"
        cycles:
          type: array
          items:
            type: array
            items:
              type: string
    ResolvedWorkflowDependency:
      type: object
      required: [workflow_id, version]
      properties:
        workflow_id:
          type: string
        version:
          type: string
    ModelRequirement:
      type: object
      required: [id, capability]
      properties:
        id:
          type: string
        capability:
          type: string
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ModelVariant"
    ModelVariant:
      type: object
      required: [id, provider, format, repo]
      properties:
        id:
          type: string
        provider:
          type: string
          enum: [hugging_face]
        format:
          type: string
        repo:
          type: string
        file:
          type: string
    WorkflowVersionMismatch:
      type: object
      required: [workflow_id, required, found, required_by]
      properties:
        workflow_id:
          type: string
        required:
          type: string
        found:
          type: string
        required_by:
          type: string
    WorkflowExecutionOptions:
      type: object
      properties:
        inputs:
          type: object
          additionalProperties: true
        disabled_nodes:
          type: array
          items:
            type: string
        enabled_nodes:
          type: array
          items:
            type: string
    WorkflowExecution:
      type: object
      required: [workflow_id, version, inputs, outputs, nodes]
      properties:
        workflow_id:
          type: string
        version:
          type: string
        inputs:
          type: object
          additionalProperties: true
        outputs:
          type: object
          additionalProperties: true
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeExecution"
    NodeExecution:
      type: object
      required: [node_id, workflow_id, status, inputs, outputs]
      properties:
        node_id:
          type: string
        workflow_id:
          type: string
        status:
          type: string
          enum: [completed, skipped]
        inputs:
          type: object
          additionalProperties: true
        outputs:
          type: object
          additionalProperties: true
